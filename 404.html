<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 – Seite nicht gefunden · jeamr.com</title>
  <meta name="robots" content="noindex"/>
  <link rel="canonical" href="https://jeamr.com/"/>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
  <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32"/>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
  <link href="fonts.css" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0B0D0B;
      --card:      #121512;
      --line:      #232823;
      --white:     #F2F3F0;
      --grey:      #9BA09A;
      --dim:       #5C625C;
      --green:     #0E6CCF;
      --green-dim: #0B55A3;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      padding: 1.1rem 2.5rem;
      background: rgba(11,13,11,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .nav-logo {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      color: var(--white);
      text-decoration: none;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem 4rem;
      position: relative;
      z-index: 1;
    }

    .container {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .error-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 700;
      color: var(--green);
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 0.5rem;
    }

    .error-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    h1 {
      font-family: 'Archivo', sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 900;
      color: var(--white);
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    p {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--grey);
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.9rem 2rem;
      border: 2px solid var(--green);
      color: var(--bg);
      background: var(--green);
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .btn:hover {
      background: transparent;
      color: var(--green);
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--dim);
      border-top: 1px solid var(--line);
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">JY://</a>
  </nav>

  <main>
    <div class="container">
      <div class="error-code">404</div>
      <div class="error-label">// Page not found</div>
      <h1>Diese Seite existiert nicht.</h1>
      <p>Der gesuchte Sprint wurde nicht gefunden — oder wurde bereits erfolgreich abgeschlossen.</p>
      <a href="/" class="btn">Zurück zur Startseite ↗</a>
    </div>
  </main>

  <footer>jeamr.com &nbsp;·&nbsp; Jean-Yves Meyer</footer>
</body>
</html>
